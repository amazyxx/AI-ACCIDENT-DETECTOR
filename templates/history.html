<html>
<head>
    <title>Guardian AI - History</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 40px; background-color: #f4f7f6; }
        table { width: 100%; border-collapse: collapse; background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #2c3e50; color: white; }
    </style>
</head>
<body>
    <a href="/">← Back to Dashboard</a>
    <h1>🚨 Accident History Log</h1>
    <table>
        <tr><th>Time</th><th>Event Type</th><th>Object & Confidence</th></tr>
        {% for log in logs %}
        <tr>
            <td>{{ log.timestamp }}</td>
            <td>{{ log.event }}</td>
            <td>{{ log.class }} ({{ log.confidence }})</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
